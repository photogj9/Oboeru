<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Oboeru — 覚える</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;500;600&display=swap');

:root{
  --paper:#F1ECE2;
  --paper-raised:#FBF8F2;
  --ink:#211F1C;
  --ink-soft:#75695A;
  --ink-faint:#A79C8B;
  --line:#DED2BC;
  --seal:#A33B2E;
  --seal-soft:#E7D3CC;
  --moss:#5B6B4C;
  --moss-soft:#DDE3D1;
  --gold:#9C7A17;
  --gold-soft:#F1E4BC;
  --warn-bg:#F6E4DE;
  --warn-text:#8C3A22;
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
}

.jp{ font-family:'Noto Sans JP',sans-serif; }

#root{
  width:100%;
  max-width:460px;
  min-height:100vh;
  padding:20px 18px 40px;
  display:flex;
  flex-direction:column;
}

.brand{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  margin-bottom:18px;
}
.brand-name{
  font-family:'Noto Sans JP',sans-serif;
  font-weight:700;
  font-size:21px;
  letter-spacing:0.01em;
}
.brand-sub{
  font-size:11px;
  color:var(--ink-soft);
  letter-spacing:0.03em;
  margin-top:2px;
}
.nav-link{
  font-size:12px;
  font-weight:500;
  color:var(--ink-soft);
  text-decoration:underline;
  cursor:pointer;
  padding:4px 0;
}

.mode-switch{
  display:flex;
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-radius:12px;
  padding:3px;
  margin-bottom:16px;
}
.mode-btn{
  flex:1;
  border:none;
  background:transparent;
  padding:9px 6px;
  font-family:'Inter',sans-serif;
  font-size:13px;
  font-weight:500;
  color:var(--ink-soft);
  border-radius:9px;
  cursor:pointer;
}
.mode-btn.active{
  background:var(--ink);
  color:var(--paper-raised);
}

.stats-row{
  display:flex;
  gap:8px;
  margin-bottom:18px;
}
.stat{
  flex:1;
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-radius:10px;
  padding:8px 10px;
  text-align:center;
}
.stat-num{
  font-size:17px;
  font-weight:600;
}
.stat-label{
  font-size:10px;
  color:var(--ink-soft);
  text-transform:uppercase;
  letter-spacing:0.05em;
  margin-top:2px;
  cursor:help;
}

.card-area{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  position:relative;
}

.card{
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-radius:20px;
  padding:36px 24px;
  min-height:260px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
  overflow:hidden;
}

.pos-tag{
  position:absolute;
  top:14px;
  left:16px;
  font-size:10px;
  color:var(--ink-faint);
  text-transform:uppercase;
  letter-spacing:0.06em;
}
.custom-tag{
  position:absolute;
  top:14px;
  right:16px;
  font-size:10px;
  color:var(--seal);
  text-transform:uppercase;
  letter-spacing:0.06em;
}

.prompt-en{
  font-family:'Inter',sans-serif;
  font-size:26px;
  font-weight:500;
  line-height:1.3;
}
.prompt-jp{
  font-family:'Noto Sans JP',sans-serif;
  font-size:42px;
  font-weight:700;
  line-height:1.3;
}
.prompt-hira{
  font-family:'Noto Sans JP',sans-serif;
  font-size:26px;
  font-weight:500;
  color:var(--ink-soft);
  margin-top:8px;
}

.reveal-block{
  margin-top:18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}
.reveal-jp{
  font-family:'Noto Sans JP',sans-serif;
  font-size:32px;
  font-weight:700;
}
.reveal-hira{
  font-family:'Noto Sans JP',sans-serif;
  font-size:22px;
  font-weight:500;
  color:var(--ink-soft);
}
.reveal-en{
  font-size:18px;
  font-weight:500;
}
.teach-label{
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:0.06em;
  color:var(--seal);
  font-weight:600;
  margin-bottom:10px;
}
.teach-example{
  margin-top:16px;
  padding-top:14px;
  border-top:1px solid var(--line);
  width:100%;
}
.teach-example-jp{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}
.teach-example .jp{
  font-family:'Noto Sans JP',sans-serif;
  font-size:18px;
  font-weight:500;
}
.audio-btn-sm{
  width:30px;
  height:30px;
  font-size:13px;
}
.teach-example-en{
  font-size:13px;
  color:var(--ink-soft);
  margin-top:4px;
}
.audio-btn{
  border:1px solid var(--line);
  background:var(--paper);
  color:var(--ink);
  width:40px;
  height:40px;
  border-radius:50%;
  cursor:pointer;
  font-size:16px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.audio-btn:active{transform:scale(0.94);}
.audio-btn.audio-error{
  background:var(--warn-bg);
  border-color:var(--seal);
  color:var(--warn-text);
}

.phrase-card{
  background:var(--paper);
  border:1px dashed var(--line);
  border-radius:16px;
  padding:24px 20px;
  margin-top:14px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  gap:10px;
}
.phrase-label{
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:0.06em;
  color:var(--ink-faint);
}
.phrase-en{
  font-size:18px;
  font-weight:500;
}
.phrase-jp{
  font-family:'Noto Sans JP',sans-serif;
  font-size:22px;
  font-weight:700;
}
.phrase-hira{
  font-family:'Noto Sans JP',sans-serif;
  font-size:17px;
  font-weight:500;
  color:var(--ink-soft);
}

.reveal-cta{
  margin-top:22px;
  width:100%;
  padding:15px;
  border-radius:14px;
  border:none;
  background:var(--ink);
  color:var(--paper-raised);
  font-family:'Inter',sans-serif;
  font-size:15px;
  font-weight:500;
  cursor:pointer;
}
.reveal-cta:active{transform:scale(0.98);}

.grade-row{
  margin-top:16px;
  display:flex;
  gap:8px;
}
.grade-btn{
  flex:1;
  padding:14px 4px;
  border-radius:14px;
  border:1px solid var(--line);
  background:var(--paper-raised);
  font-family:'Inter',sans-serif;
  font-size:13px;
  font-weight:500;
  cursor:pointer;
  color:var(--ink);
}
.grade-btn:active{transform:scale(0.97);}
.grade-missed{border-color:var(--seal); color:var(--seal); background:var(--seal-soft);}
.grade-remembered{border-color:var(--moss); color:var(--moss); background:var(--moss-soft);}
.grade-instant{border-color:var(--gold); color:var(--gold); background:var(--gold-soft);}

.progress-track{
  height:4px;
  border-radius:2px;
  background:var(--line);
  margin-top:18px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  background:var(--ink);
  border-radius:2px;
  transition:width 0.25s ease;
}

.empty-state{
  text-align:center;
  padding:40px 12px;
}
.empty-title{
  font-family:'Noto Sans JP',sans-serif;
  font-size:22px;
  font-weight:700;
  margin-bottom:8px;
}
.empty-body{
  font-size:14px;
  color:var(--ink-soft);
  line-height:1.5;
  margin-bottom:20px;
}
.empty-btn{
  padding:13px 22px;
  border-radius:12px;
  border:1px solid var(--line);
  background:var(--paper-raised);
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  color:var(--ink);
}

.footer-link{
  text-align:center;
  margin-top:22px;
  font-size:11px;
  color:var(--ink-faint);
  text-decoration:underline;
  cursor:pointer;
}

.stamp{
  position:absolute;
  top:50%;
  left:50%;
  width:96px;
  height:96px;
  border:4px solid var(--seal);
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Noto Sans JP',sans-serif;
  font-size:30px;
  font-weight:900;
  color:var(--seal);
  transform:translate(-50%,-50%) scale(1.6) rotate(-18deg);
  opacity:0;
  pointer-events:none;
  animation:stampIn 0.9s ease forwards;
}
@keyframes stampIn{
  0%{opacity:0; transform:translate(-50%,-50%) scale(1.8) rotate(-18deg);}
  30%{opacity:0.9; transform:translate(-50%,-50%) scale(0.95) rotate(-10deg);}
  45%{transform:translate(-50%,-50%) scale(1.05) rotate(-10deg);}
  70%{opacity:0.9;}
  100%{opacity:0; transform:translate(-50%,-50%) scale(1.05) rotate(-10deg);}
}

.loading{
  text-align:center;
  padding:60px 12px;
  color:var(--ink-soft);
  font-size:14px;
}

.search-input{
  width:100%;
  padding:12px 14px;
  border-radius:12px;
  border:1px solid var(--line);
  background:var(--paper-raised);
  font-family:'Inter',sans-serif;
  font-size:14px;
  color:var(--ink);
  margin-bottom:12px;
}
.search-input:focus{outline:1px solid var(--ink-soft);}

.word-list{
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-bottom:20px;
}
.word-row{
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-radius:10px;
  padding:10px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.word-row-jp{
  font-family:'Noto Sans JP',sans-serif;
  font-size:17px;
  font-weight:700;
}
.word-row-hira{
  font-family:'Noto Sans JP',sans-serif;
  font-size:13px;
  color:var(--ink-soft);
}
.word-row-en{
  font-size:12px;
  color:var(--ink-soft);
  margin-top:2px;
}
.word-row-status{
  font-size:10px;
  padding:3px 8px;
  border-radius:8px;
  background:var(--paper);
  border:1px solid var(--line);
  color:var(--ink-soft);
  white-space:nowrap;
}
.word-count{
  font-size:12px;
  color:var(--ink-soft);
  margin-bottom:10px;
}
.word-row-delete{
  border:1px solid var(--line);
  background:var(--paper);
  color:var(--ink-faint);
  width:28px;
  height:28px;
  border-radius:50%;
  cursor:pointer;
  font-size:16px;
  line-height:1;
  flex-shrink:0;
}
.word-row-delete:active{
  background:var(--warn-bg);
  color:var(--seal);
}
.form-cancel{
  padding:12px 16px;
  border-radius:10px;
  border:1px solid var(--line);
  background:transparent;
  color:var(--ink-soft);
  font-size:14px;
  font-weight:500;
  cursor:pointer;
}

.add-word-toggle{
  width:100%;
  padding:13px;
  border-radius:12px;
  border:1px dashed var(--line);
  background:transparent;
  font-size:14px;
  font-weight:500;
  color:var(--ink-soft);
  cursor:pointer;
  margin-bottom:16px;
}

.add-form{
  background:var(--paper-raised);
  border:1px solid var(--line);
  border-radius:14px;
  padding:16px;
  margin-bottom:20px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.form-label{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.04em;
  color:var(--ink-soft);
  margin-bottom:4px;
  display:block;
}
.form-input{
  width:100%;
  padding:10px 12px;
  border-radius:9px;
  border:1px solid var(--line);
  background:var(--paper);
  font-family:'Inter',sans-serif;
  font-size:14px;
  color:var(--ink);
}
.form-input.jp{ font-family:'Noto Sans JP',sans-serif; }
.form-row-title{
  font-size:14px;
  font-weight:500;
  margin-bottom:2px;
}
.form-submit{
  padding:12px;
  border-radius:10px;
  border:none;
  background:var(--ink);
  color:var(--paper-raised);
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  margin-top:4px;
}
.form-warning{
  background:var(--warn-bg);
  color:var(--warn-text);
  border-radius:9px;
  padding:10px 12px;
  font-size:13px;
  line-height:1.4;
}
.form-success{
  background:var(--moss-soft);
  color:var(--moss);
  border-radius:9px;
  padding:10px 12px;
  font-size:13px;
}
textarea.form-input{
  resize:vertical;
  min-height:56px;
  line-height:1.5;
}
.analysis-box{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.chip-row{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.chip{
  display:inline-block;
  padding:5px 10px;
  border-radius:20px;
  font-size:13px;
}
.chip-known{
  background:var(--moss-soft);
  color:var(--moss);
}
.unknown-word-card{
  background:var(--paper);
  border:1px dashed var(--line);
  border-radius:10px;
  padding:12px;
  display:flex;
  flex-direction:column;
  gap:6px;
}
.unknown-kanji{
  font-size:18px;
  font-weight:700;
}
</style>
</head>

<script>
// Persistence fallback: when the host does not provide window.storage
// (e.g. a plain browser or GitHub Pages), back it with localStorage so that
// progress, custom words, edited/deleted base words, and phrases survive a
// page reload. When the host provides window.storage, this block is skipped
// and host behavior is unchanged.
if (!window.storage) {
  window.storage = {
    get(key){
      try { const v = localStorage.getItem(key); return Promise.resolve(v === null ? null : { value: v }); }
      catch(e){ return Promise.resolve(null); }
    },
    set(key, value){
      try { localStorage.setItem(key, value); } catch(e){}
      return Promise.resolve();
    },
    delete(key){
      try { localStorage.removeItem(key); } catch(e){}
      return Promise.resolve();
    }
  };
}

const BASE_VOCAB = JSON.parse(document.getElementById("vocab-data").textContent);
const BASE_PHRASES = JSON.parse(document.getElementById("phrase-data").textContent);

const PARTICLES = ["ません","ました","ましょう","でした","です","という","けれど","しかし","でも","ながら","たり","ため","ので","のに","から","まで","より","だけ","ばかり","って","ちゃ","ます",
  "は","が","を","に","で","と","も","の","へ","や","ね","よ","わ","だ","ば"].sort((a,b) => b.length - a.length);
const PUNCTUATION = new Set(["、","。","！","？","「","」","『","』","・","!","?",","]);
const isKanji = ch => !!ch && /[\u4e00-\u9faf\u3400-\u4dbf]/.test(ch);

function analyzePhrase(text, vocabPool){
  const dict = vocabPool.filter(w => w.kanji).slice().sort((a,b) => b.kanji.length - a.kanji.length);
  let i = 0;
  const knownIds = [];
  const unknownSpans = [];
  let cur = "";
  while (i < text.length){
    let matched = null;
    for (const w of dict){
      if (text.startsWith(w.kanji, i)){
        const firstIsKanji = isKanji(w.kanji[0]);
        const lastIsKanji = isKanji(w.kanji[w.kanji.length - 1]);
        const before = text[i - 1];
        const after = text[i + w.kanji.length];
        if (firstIsKanji && isKanji(before)) continue;
        if (lastIsKanji && isKanji(after)) continue;
        matched = w;
        break;
      }
    }
    if (matched){
      if (cur){ unknownSpans.push(cur); cur = ""; }
      if (!knownIds.includes(matched.id)) knownIds.push(matched.id);
      i += matched.kanji.length;
      continue;
    }
    if (PUNCTUATION.has(text[i])){
      if (cur){ unknownSpans.push(cur); cur = ""; }
      i += 1;
      continue;
    }
    if (text[i] === "か" && i === text.length - 1){
      if (cur){ unknownSpans.push(cur); cur = ""; }
      i += 1;
      continue;
    }
    let p = null;
    for (const part of PARTICLES){ if (text.startsWith(part, i)){ p = part; break; } }
    if (p){
      if (cur){ unknownSpans.push(cur); cur = ""; }
      i += p.length;
      continue;
    }
    cur += text[i];
    i += 1;
  }
  if (cur) unknownSpans.push(cur);
  return { knownIds, unknownSpans };
}

function rebuildAllWords(){
  const effectiveBase = BASE_VOCAB
    .filter(w => !baseDeleted.includes(w.id))
    .map(w => baseOverrides[w.id] ? Object.assign({}, w, baseOverrides[w.id]) : w);
  ALL_WORDS = effectiveBase.concat(customVocab);
}

function currentPool(){
  if (state.mode === "phrase") return PHRASES;
  if (state.mode === "reading") return masteredWords();   // gated on Vocab mastery
  return ALL_WORDS;
}

let cachedVoices = [];
if ("speechSynthesis" in window){
  const loadVoices = () => { cachedVoices = speechSynthesis.getVoices(); };
  loadVoices();
  speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text, btn){
  if (!("speechSynthesis" in window)){
    flashAudioNote(btn);
    return;
  }
  try{
    speechSynthesis.resume();
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ja-JP";
    const jaVoice = cachedVoices.find(v => v.lang === "ja-JP") || cachedVoices.find(v => v.lang && v.lang.startsWith("ja"));
    if (jaVoice) u.voice = jaVoice;
    u.rate = 0.9;
    let started = false;
    u.onstart = () => { started = true; };
    u.onerror = () => { flashAudioNote(btn); };
    speechSynthesis.speak(u);
    setTimeout(() => { if (!started) flashAudioNote(btn); }, 1200);
  }catch(e){
    flashAudioNote(btn);
  }
}

function flashAudioNote(btn){
  if (!btn) return;
  const original = btn.textContent;
  btn.textContent = "!";
  btn.classList.add("audio-error");
  setTimeout(() => {
    btn.textContent = original;
    btn.classList.remove("audio-error");
  }, 1500);
}

// Convert one legacy flat record into a per-mode record. Grade counters are
// backfilled from what the old shape knew: correct answers become
// "remembered", the rest "missed"; Instant history is unknown, so 0.
function migrateFlatRecord(old){
  const reviews = old.reviews || 0;
  const correct = old.correct || 0;
  return {
    status: old.status || "New",
    introduced: reviews > 0,
    reviews,
    lastReviewed: old.lastReviewed || null,
    nextReview: old.nextReview || 0,
    ease: old.ease || 2.5,
    interval: old.interval || 0,
    missed: Math.max(0, reviews - correct),
    remembered: correct,
    instant: 0,
    streak: old.status === "Learning" ? 0 : (correct > 0 ? 1 : 0)
  };
}
// One-time, idempotent migration from the old flat progress shape (one record
// per item) to the new per-mode shape (state.progress[id] = { vocab | reading |
// phrase }). Words migrate into .vocab, phrases into .phrase; Reading
// deliberately resets to fresh so it can later be gated on demonstrated Vocab
// mastery. Records already in the new shape are left untouched, so re-running
// this is safe.
function migrateProgress(raw){
  const phraseIds = new Set(PHRASES.map(p => p.id));
  const out = {};
  for (const id in raw){
    const r = raw[id];
    if (!r || typeof r !== "object"){ out[id] = {}; continue; }
    if (r.vocab || r.reading || r.phrase){ out[id] = r; continue; }   // already new shape
    if (typeof r.status === "string"){
      out[id] = phraseIds.has(id) ? { phrase: migrateFlatRecord(r) }
                                  : { vocab: migrateFlatRecord(r) };
    } else {
      out[id] = {};
    }
  }
  return out;
}

// A per-mode study record. Each item keeps one of these per study mode
// (vocab / reading / phrase) under state.progress[id][mode], so the three
// modes track status and grade history independently.
function defaultRecord(){
  return {
    status:"New", introduced:false,
    reviews:0, lastReviewed:null, nextReview:0, ease:2.5, interval:0,
    missed:0, remembered:0, instant:0, streak:0
  };
}
// Get (creating on demand) the record for an item in a given mode.
function modeRec(id, mode){
  mode = mode || state.mode;
  let entry = state.progress[id];
  if (!entry) entry = state.progress[id] = {};
  if (!entry[mode]) entry[mode] = defaultRecord();
  return entry[mode];
}
// Read-only status for the library rows: never materializes a record, so
// unseen items simply read as "New".
function statusFor(id, mode){
  const e = state.progress[id];
  return e && e[mode] ? e[mode].status : "New";
}
// A word is "mastered" in Vocab — and thus eligible for Reading Recall — once
// it has graduated to Review, isn't currently backsliding (a recent Miss resets
// streak), and has enough successful recalls. Instant is strong evidence (worth
// 2 points); a plain Remembered is worth 1. So a single Instant masters
// immediately, or two Remembered do — but one lucky Remembered tap does not.
// Single source of truth so the bar is easy to tune.
function isMastered(rec){
  return !!rec && rec.status === "Review"
    && (rec.instant * 2 + rec.remembered) >= 2
    && rec.streak >= 1;
}
// Words whose Vocab record is mastered, without materializing any records
// (read-only): used to gate the Reading pool.
function masteredWords(){
  return ALL_WORDS.filter(w => {
    const e = state.progress[w.id];
    return isMastered(e && e.vocab);
  });
}
function ensureAllCards(progress){
  ALL_WORDS.concat(PHRASES).forEach(c => { if (!progress[c.id]) progress[c.id] = {}; });
  return progress;
}

// --- V1 study selection: randomized order, weighted so weak items come back
// more and strong items less (but never disappear). Shared by all three modes
// (vocab / reading / phrase) since they all build the queue through here.
function reviewWeight(rec){
  if (!rec || rec.status === "New") return 3;      // keep introducing unseen items
  if (rec.status === "Learning") return 4;         // "Missed" — resurface sooner / more often
  // "Review" (graded Remembered or Instant). Instant raises ease above the
  // 2.5 default, so lean on that to show it less — but never to zero.
  return rec.ease >= 2.6 ? 1 : 2;                  // Instant : Remembered
}

// Weighted shuffle (Efraimidis–Spirakis): key = rand^(1/weight), sort desc.
// Higher weight tends to sort earlier, so heavier items are both more likely
// to make the session cut and to appear sooner — while order stays random.
function weightedShuffle(cards){
  return cards
    .map(c => ({ c, key: Math.pow(Math.random() || 1e-9, 1 / reviewWeight(modeRec(c.id))) }))
    .sort((a, b) => b.key - a.key)
    .map(x => x.c);
}

function buildQueue(all){
  const pool = currentPool();
  const now = Date.now();
  const due = pool.filter(c => (modeRec(c.id).nextReview || 0) <= now);
  // Split due items into brand-new (never introduced -> teaching phase) and
  // recall (already introduced).
  const fresh = [], recall = [];
  due.forEach(c => (modeRec(c.id).introduced ? recall : fresh).push(c));

  // Backlog gate: only introduce new items while the Learning pile has room, so
  // sessions consolidate half-learned items instead of piling on more.
  const learningCount = pool.filter(c => modeRec(c.id).status === "Learning").length;
  const newBudget = Math.max(0, Math.min(NEW_PER_SESSION, LEARNING_CAP - learningCount));
  const newItems = weightedShuffle(fresh).slice(0, newBudget);

  let recallItems = weightedShuffle(recall);
  if (!all) recallItems = recallItems.slice(0, Math.max(0, SESSION_GOAL - newItems.length));

  // Front learning phase: Teach -> Immediate Practice for each new item, in order.
  const learningPhase = [];
  newItems.forEach(c => {
    learningPhase.push({ id: c.id, step: "teach" });
    learningPhase.push({ id: c.id, step: "practice" });
  });
  // Review phase: due recalls + the new items, randomized together.
  const reviewPhase = weightedShuffle(recallItems.concat(newItems))
    .map(c => ({ id: c.id, step: "review" }));

  const queue = learningPhase.concat(reviewPhase);
  // When there's no learning phase, don't open with the exact item just shown.
  if (learningPhase.length === 0 && queue.length > 1 && queue[0].id === state.lastShownId){
    queue.push(queue.shift());
  }
  state.queue = queue;
  state.qIndex = 0;
  state.revealed = false;
  state.sessionReviewed = 0;
  state.introAttempts = {};
}

// The queue holds { id, step } entries (step: teach | practice | review).
function curEntry(){ return state.queue[state.qIndex]; }

function counts(){
  const pool = currentPool();
  const c = { New:0, Learning:0, Review:0 };
  pool.forEach(card => { c[modeRec(card.id).status]++; });
  return c;
}

function grade(quality){
  const id = curEntry().id;
  const rec = modeRec(id);
  state.lastShownId = id;
  rec.reviews += 1;
  rec.lastReviewed = Date.now();

  if (quality === "again"){
    rec.missed += 1;
    rec.streak = 0;
    rec.ease = Math.max(1.3, rec.ease - 0.2);
    rec.interval = 0;
    rec.status = "Learning";
    rec.nextReview = Date.now();
    const requeueAt = Math.min(state.qIndex + 4, state.queue.length);
    state.queue.splice(requeueAt, 0, { id, step: "review" });
  } else if (quality === "good"){
    rec.remembered += 1;
    rec.streak += 1;
    rec.interval = rec.interval === 0 ? 1 : Math.round(rec.interval * rec.ease);
    rec.status = "Review";
    rec.nextReview = Date.now() + rec.interval * 86400000;
  } else if (quality === "easy"){
    rec.instant += 1;
    rec.streak += 1;
    rec.interval = rec.interval === 0 ? 3 : Math.round(rec.interval * rec.ease * 1.3);
    rec.ease = rec.ease + 0.15;
    rec.status = "Review";
    rec.nextReview = Date.now() + rec.interval * 86400000;
  }

  saveProgress(state.progress);
  state.sessionReviewed += 1;
  state.qIndex += 1;
  state.revealed = false;

  render();
  if (quality === "easy") setTimeout(() => showStamp("覚"), 20);
}

// Finish a teaching card and advance to its immediate practice. Mark the item
// introduced + Learning so future sessions treat it as recall (not a fresh
// teach) and it counts toward the Learning backlog gate. The immediate practice
// that follows is next in the queue.
function startPractice(){
  const id = curEntry().id;
  const rec = modeRec(id);
  rec.introduced = true;
  if (rec.status === "New") rec.status = "Learning";
  saveProgress(state.progress);
  state.lastShownId = id;
  state.qIndex += 1;
  state.revealed = false;
  render();
}

// Immediate-practice result. Deliberately transient: neither Got it nor Missed
// touches scheduling or mastery — seconds-later recall isn't evidence of
// retention. On a miss (within the retry cap) re-teach then re-practice the
// item right away; past the cap, move on with no persisted effect either way.
function practiceResult(result){
  const id = curEntry().id;
  state.lastShownId = id;
  if (result === "missed"){
    const attempts = (state.introAttempts[id] || 0) + 1;
    state.introAttempts[id] = attempts;
    if (attempts <= PRACTICE_RETRIES){
      state.queue.splice(state.qIndex + 1, 0, { id, step: "teach" }, { id, step: "practice" });
    }
  }
  state.qIndex += 1;
  state.revealed = false;
  render();
}

async function submitWordForm(ev){
  ev.preventDefault();
  const f = ev.target;
  const english = f.english.value.trim();
  const kanji = f.kanji.value.trim();
  const hiragana = f.hiragana.value.trim();
  const partOfSpeech = f.partOfSpeech.value.trim();
  const exampleJapanese = f.exampleJapanese.value.trim();
  const exampleHiragana = f.exampleHiragana.value.trim();
  const exampleEnglish = f.exampleEnglish.value.trim();
  const tagsRaw = f.tags.value.trim();
  const source = f.source.value.trim();

  if (!english || !kanji || !hiragana){
    state.addFormMessage = { type:"warning", text:"English, kanji, and hiragana are required." };
    render();
    return;
  }

  const dup = ALL_WORDS.find(w => w.kanji === kanji && w.hiragana === hiragana && w.id !== state.editingId);
  if (dup){
    state.addFormMessage = { type:"warning", text:`Already in your library as "${dup.english}" (${dup.kanji} / ${dup.hiragana}). Not saved.` };
    render();
    return;
  }

  const fields = {
    english, kanji, hiragana,
    partOfSpeech: partOfSpeech || undefined,
    exampleJapanese: exampleJapanese || undefined,
    exampleHiragana: exampleHiragana || undefined,
    exampleEnglish: exampleEnglish || undefined,
    tags: tagsRaw ? tagsRaw.split(",").map(t => t.trim()).filter(Boolean) : [],
    source: source || undefined
  };

  if (state.formMode === "edit"){
    const id = state.editingId;
    const customIdx = customVocab.findIndex(w => w.id === id);
    if (customIdx !== -1){
      customVocab[customIdx] = Object.assign({}, customVocab[customIdx], fields);
      await saveCustomVocab(customVocab);
    } else {
      baseOverrides[id] = fields;
      await saveBaseOverrides(baseOverrides);
    }
    rebuildAllWords();
    state.addFormMessage = { type:"success", text:`Saved changes to "${fields.english}" (${fields.kanji}).` };
  } else {
    const newWord = Object.assign({ id: nextId(), dateAdded: new Date().toISOString() }, fields);
    if (!newWord.source) newWord.source = "custom";
    customVocab.push(newWord);
    rebuildAllWords();
    state.progress[newWord.id] = {};
    await saveCustomVocab(customVocab);
    await saveProgress(state.progress);
    state.addFormMessage = { type:"success", text:`Added "${newWord.english}" (${newWord.kanji}) to your library.` };
  }

  state.formMode = null;
  state.editingId = null;
  render();
}

async function deleteWord(id){
  const word = ALL_WORDS.find(w => w.id === id);
  if (!word) return;
  if (!confirm(`Delete "${word.english}" (${word.kanji})? This can't be undone.`)) return;

  const customIdx = customVocab.findIndex(w => w.id === id);
  if (customIdx !== -1){
    customVocab.splice(customIdx, 1);
    await saveCustomVocab(customVocab);
  } else {
    if (!baseDeleted.includes(id)) baseDeleted.push(id);
    await saveBaseDeleted(baseDeleted);
    delete baseOverrides[id];
    await saveBaseOverrides(baseOverrides);
  }

  rebuildAllWords();
  buildQueue(false);
  state.formMode = null;
  state.editingId = null;
  state.addFormMessage = { type:"success", text:`Deleted "${word.english}" (${word.kanji}).` };
  render();
}

  buildQueue(false);
  render();
}

async function addUnknownWord(idx){
  capturePhraseDraft();
  const span = state.phraseAnalysis.unknownSpans[idx];
  const hiraEl = document.getElementById("unk-hira-" + idx);
  const enEl = document.getElementById("unk-en-" + idx);
  const hiragana = hiraEl ? hiraEl.value.trim() : "";
  const english = enEl ? enEl.value.trim() : "";

  if (!hiragana || !english){
    alert("Fill in both the hiragana reading and English meaning before adding this word.");
    return;
  }

  const dup = ALL_WORDS.find(w => w.kanji === span && w.hiragana === hiragana);
  if (dup){
    alert(`"${span}" is already in your library as "${dup.english}".`);
  } else {
    const newWord = {
      id: nextId(),
      english, kanji: span, hiragana,
      source: "from-phrase",
      dateAdded: new Date().toISOString(),
      tags: []
    };
    customVocab.push(newWord);
    rebuildAllWords();
    state.progress[newWord.id] = {};
    await saveCustomVocab(customVocab);
    await saveProgress(state.progress);
  }

  state.phraseAnalysis = analyzePhrase(state.phraseDraft.japanese, ALL_WORDS);
  render();
}

function ignoreUnknownWord(idx){
  capturePhraseDraft();
  state.phraseAnalysis.unknownSpans.splice(idx, 1);
  render();
}

async function submitPhraseForm(ev){
  ev.preventDefault();
  const f = ev.target;
  const japanese = f.japanese.value.trim();
  const hiragana = f.hiragana.value.trim();
  const english = f.english.value.trim();
  const tagsRaw = f.tags.value.trim();
  const source = f.source.value.trim();

  if (!japanese || !hiragana || !english){
    state.phraseFormMessage = { type:"warning", text:"Japanese, hiragana, and English are all required." };
    render();
    return;
  }

  const wordIds = analyzePhrase(japanese, ALL_WORDS).knownIds;
  const fields = {
    japanese, hiragana, english, wordIds,
    tags: tagsRaw ? tagsRaw.split(",").map(t => t.trim()).filter(Boolean) : [],
    source: source || undefined
  };

  if (state.phraseFormMode === "edit"){
    const idx = PHRASES.findIndex(p => p.id === state.phraseEditingId);
    if (idx !== -1) PHRASES[idx] = Object.assign({}, PHRASES[idx], fields);
    state.phraseFormMessage = { type:"success", text:`Saved changes to "${english}".` };
  } else {
    const newPhrase = Object.assign({ id: nextPhraseId(), dateAdded: new Date().toISOString() }, fields);
    PHRASES.push(newPhrase);
    state.progress[newPhrase.id] = {};
    await saveProgress(state.progress);
    state.phraseFormMessage = { type:"success", text:`Added "${english}" to your phrases.` };
  }

  await savePhrases(PHRASES);
  state.phraseFormMode = null;
  state.phraseEditingId = null;
  state.phraseAnalysis = null;
  state.phraseDraft = null;
  render();
}

async function deletePhrase(id){
  const phrase = PHRASES.find(p => p.id === id);
  if (!phrase) return;
  if (!confirm(`Delete "${phrase.english}"? This can't be undone.`)) return;
  PHRASES = PHRASES.filter(p => p.id !== id);
  await savePhrases(PHRASES);
  if (state.mode === "phrase") buildQueue(false);
  state.phraseFormMode = null;
  state.phraseEditingId = null;
  state.phraseFormMessage = { type:"success", text:`Deleted "${phrase.english}".` };
  render();
}

function esc(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function renderHeader(){
  const links = [];
  if (state.view !== "study") links.push('<span class="nav-link" onclick="goStudy()">Study</span>');
  if (state.view !== "library") links.push('<span class="nav-link" onclick="goLibrary()">Words</span>');
  if (state.view !== "phrases") links.push('<span class="nav-link" onclick="goPhrases()">Phrases</span>');

  let subtitle = "Library";
  if (state.view === "phrases") subtitle = "Phrases";
  if (state.view === "study"){
    subtitle = state.mode === "vocab" ? "English → Japanese"
      : state.mode === "reading" ? "Japanese → English"
      : "Phrase recall";
  }

  return `
    <div class="brand">
      <div>
        <div class="brand-name jp">覚える Oboeru</div>
        <div class="brand-sub">${subtitle}</div>
      </div>
      <div style="display:flex; flex-direction:column; align-items:flex-end; gap:2px;">${links.join("")}</div>
    </div>
  `;
}

function renderStudyCardArea(){
  const pool = currentPool();

  if (state.qIndex >= state.queue.length){
    const stillDue = pool.some(card => (modeRec(card.id).nextReview || 0) <= Date.now());
    if (state.sessionReviewed === 0 && state.queue.length === 0){
      if (pool.length === 0){
        if (state.mode === "phrase") return `
          <div class="empty-state">
            <div class="empty-title">No phrases yet</div>
            <div class="empty-body">Add a phrase and it'll show up here for review.</div>
            <button class="empty-btn" onclick="goPhrases()">Add a phrase</button>
          </div>`;
        // Reading is gated on Vocab mastery: if there are words but none are
        // mastered yet, guide the user back to Vocab rather than show an empty deck.
        if (state.mode === "reading" && ALL_WORDS.length > 0) return `
          <div class="empty-state">
            <div class="empty-title">Reading is locked for now</div>
            <div class="empty-body">Reading Recall uses words you've mastered in Vocab. Keep studying Vocab and words will unlock here.</div>
            <button class="empty-btn" onclick="switchMode('vocab')">Study Vocab</button>
          </div>`;
        return `
          <div class="empty-state">
            <div class="empty-title">No words yet</div>
            <div class="empty-body">Add a word to your library to start studying.</div>
            <button class="empty-btn" onclick="goLibrary()">Go to library</button>
          </div>`;
      }
      return `
        <div class="empty-state">
          <div class="empty-title">All caught up</div>
          <div class="empty-body">Nothing's due right now. Come back later, or review early if you want more practice today.</div>
          <button class="empty-btn" onclick="buildQueue(true); render();">Review anyway</button>
        </div>`;
    }
    return `
      <div class="empty-state">
        <div class="empty-title">Session complete</div>
        <div class="empty-body">You reviewed ${state.sessionReviewed} card${state.sessionReviewed === 1 ? "" : "s"} just now.</div>
        <button class="empty-btn" onclick="buildQueue(${stillDue}); render();">${stillDue ? "Continue reviewing" : "Study more anyway"}</button>
      </div>`;
  }

  const entry = curEntry();
  const id = entry.id;
  const card = pool.find(x => x.id === id);
  const isPhrase = state.mode === "phrase";
  const isVocab = state.mode === "vocab";

  // Teach step: a non-graded teaching card. Shows the item fully (both sides +
  // audio + example) regardless of mode, then advances to immediate practice.
  if (entry.step === "teach"){
    const jp = isPhrase ? card.japanese : card.kanji;
    const teachAudio = card.hiragana || jp;
    const exampleAudio = card.exampleHiragana || card.exampleJapanese || "";
    const exampleHtml = (!isPhrase && card.exampleJapanese) ? `
      <div class="teach-example">
        <div class="teach-example-jp">
          <span class="jp">${esc(card.exampleJapanese)}</span>
          <button class="audio-btn audio-btn-sm" onclick="speak('${exampleAudio.replace(/'/g,"\\'")}', this)" aria-label="Play example audio">▶</button>
        </div>
        ${card.exampleEnglish ? `<div class="teach-example-en">${esc(card.exampleEnglish)}</div>` : ""}
      </div>` : "";
    return `
      <div class="card">
        <div class="teach-label">New · first look</div>
        <div class="prompt-jp jp">${esc(jp)}</div>
        <div class="prompt-hira jp">${esc(card.hiragana)}</div>
        <div class="reveal-en" style="margin-top:12px;">${esc(card.english)}</div>
        <div class="reveal-block" style="margin-top:12px;">
          <button class="audio-btn" onclick="speak('${teachAudio.replace(/'/g,"\\'")}', this)" aria-label="Play audio">▶</button>
        </div>
        ${exampleHtml}
        <button class="reveal-cta" onclick="startPractice()">Practice now</button>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${Math.round((state.qIndex / state.queue.length) * 100)}%"></div></div>
    `;
  }

  const jpText = isPhrase ? card.japanese : card.kanji;
  // Speak the kana reading, not the kanji. An isolated kanji is ambiguous to
  // the TTS voice (e.g. 頭 gets read as トウ instead of あたま), so it often
  // picks the wrong reading. The kana reading is unambiguous.
  const audioText = card.hiragana || jpText;

  const promptHtml = (isVocab || isPhrase)
    ? `<div class="prompt-en">${esc(card.english)}</div>`
    : `<div class="prompt-jp jp">${esc(card.kanji)}</div><div class="prompt-hira jp">${esc(card.hiragana)}</div>`;

  let revealHtml;
  if (state.revealed){
    revealHtml = `
      <div class="reveal-block">
        ${(isVocab || isPhrase) ? `
          <div class="reveal-jp jp" style="${isPhrase ? 'font-size:26px;' : ''}">${esc(jpText)}</div>
          <div class="reveal-hira jp">${esc(card.hiragana)}</div>
        ` : `
          <div class="reveal-en">${esc(card.english)}</div>
        `}
        <button class="audio-btn" onclick="speak('${audioText.replace(/'/g,"\\'")}', this)" aria-label="Play audio">▶</button>
      </div>
      ${entry.step === "practice" ? `
      <div class="grade-row">
        <button class="grade-btn grade-missed" onclick="practiceResult('missed')">Missed</button>
        <button class="grade-btn grade-remembered" onclick="practiceResult('got')">Got it</button>
      </div>
      ` : `
      <div class="grade-row">
        <button class="grade-btn grade-missed" onclick="grade('again')">Missed</button>
        <button class="grade-btn grade-remembered" onclick="grade('good')">Remembered</button>
        <button class="grade-btn grade-instant" onclick="grade('easy')">★ Instant</button>
      </div>
      `}
    `;
  } else {
    revealHtml = `<button class="reveal-cta" onclick="reveal()">Reveal</button>`;
  }

  const cornerTag = isPhrase
    ? `<div class="pos-tag">phrase${card.wordIds && card.wordIds.length ? " · " + card.wordIds.length + " linked word" + (card.wordIds.length === 1 ? "" : "s") : ""}</div>`
    : `<div class="pos-tag">${esc(card.partOfSpeech || "")}</div>`;

  return `
    <div class="card">
      ${cornerTag}
      ${!isPhrase && card.source === "custom" ? `<div class="custom-tag">custom</div>` : ""}
      ${entry.step === "practice" ? `<div class="teach-label">New · practice</div>` : ""}
      ${promptHtml}
      ${revealHtml}
    </div>
    <div class="progress-track"><div class="progress-fill" style="width:${Math.round((state.qIndex / state.queue.length) * 100)}%"></div></div>
  `;
}

function renderStudyView(){
  const c = counts();
  return `
    ${renderHeader()}
    <div class="mode-switch">
      <button class="mode-btn ${state.mode === 'vocab' ? 'active' : ''}" onclick="switchMode('vocab')">Vocab</button>
      <button class="mode-btn ${state.mode === 'reading' ? 'active' : ''}" onclick="switchMode('reading')">Reading</button>
      <button class="mode-btn ${state.mode === 'phrase' ? 'active' : ''}" onclick="switchMode('phrase')">Phrases</button>
    </div>
    <div class="stats-row">
      <div class="stat"><div class="stat-num">${c.New}</div><div class="stat-label" title="Never studied yet">New</div></div>
      <div class="stat"><div class="stat-num">${c.Learning}</div><div class="stat-label" title="Recently marked Missed — being re-learned with short gaps between reviews">Learning</div></div>
      <div class="stat"><div class="stat-num">${c.Review}</div><div class="stat-label" title="Graduated — intervals now measured in days, growing as you keep getting it right">Review</div></div>
    </div>
    <div class="card-area" id="card-area">
      ${renderStudyCardArea()}
    </div>
    <div class="footer-link" onclick="resetProgress()">Reset progress</div>
  `;
}

function renderLibraryView(){
  const q = state.librarySearch.trim().toLowerCase();
  const results = q
    ? ALL_WORDS.filter(w =>
        w.english.toLowerCase().includes(q) ||
        w.kanji.includes(q) ||
        w.hiragana.includes(q) ||
        (w.partOfSpeech || "").toLowerCase().includes(q) ||
        (w.tags || []).join(" ").toLowerCase().includes(q)
      )
    : ALL_WORDS;

  const rows = results.map(w => `
    <div class="word-row">
      <div style="cursor:pointer; flex:1;" onclick="openEditForm('${w.id}')">
        <div class="word-row-jp jp">${esc(w.kanji)} <span class="word-row-hira jp">${esc(w.hiragana)}</span></div>
        <div class="word-row-en">${esc(w.english)}${w.source ? " · " + esc(w.source) : ""}</div>
      </div>
      <div class="word-row-status">${statusFor(w.id, "vocab")}</div>
      <button class="word-row-delete" onclick="deleteWord('${w.id}')" aria-label="Delete ${esc(w.english)}">×</button>
    </div>
  `).join("");

  const msg = state.addFormMessage
    ? `<div class="${state.addFormMessage.type === 'warning' ? 'form-warning' : 'form-success'}" style="margin-bottom:14px;">${esc(state.addFormMessage.text)}</div>`
    : "";

  const editing = state.formMode === "edit" ? ALL_WORDS.find(w => w.id === state.editingId) : null;
  const v = (field) => editing ? esc(editing[field] || "") : "";
  const vTags = editing ? esc((editing.tags || []).join(", ")) : "";

  const form = state.formMode ? `
    <form class="add-form" id="word-form" onsubmit="submitWordForm(event)">
      <div class="form-row-title">${state.formMode === "edit" ? "Edit word" : "Add a word"}</div>
      <div>
        <label class="form-label">English *</label>
        <input class="form-input" name="english" required value="${v('english')}" />
      </div>
      <div>
        <label class="form-label">Kanji *</label>
        <input class="form-input jp" name="kanji" required value="${v('kanji')}" />
      </div>
      <div>
        <label class="form-label">Hiragana *</label>
        <input class="form-input jp" name="hiragana" required value="${v('hiragana')}" />
      </div>
      <div>
        <label class="form-label">Part of speech</label>
        <input class="form-input" name="partOfSpeech" placeholder="verb, noun, adjective…" value="${v('partOfSpeech')}" />
      </div>
      <div>
        <label class="form-label">Tags (comma-separated)</label>
        <input class="form-input" name="tags" placeholder="anime, JLPT N5…" value="${vTags}" />
      </div>
      <div>
        <label class="form-label">Source</label>
        <input class="form-input" name="source" placeholder="textbook, app, personal list…" value="${v('source')}" />
      </div>
      <div style="display:flex; gap:8px;">
        <button type="submit" class="form-submit" style="flex:1;">${state.formMode === "edit" ? "Save changes" : "Add to library"}</button>
        <button type="button" class="form-cancel" onclick="closeForm()">Cancel</button>
      </div>
    </form>
  ` : "";

  return `
    ${renderHeader()}
    <input id="lib-search-input" class="search-input" placeholder="Search by english, kanji, hiragana, or tag" value="${esc(state.librarySearch)}" oninput="updateSearch(this.value)" />
    <div class="word-count">${results.length} of ${ALL_WORDS.length} words</div>
    ${msg}
    ${state.formMode !== "add" ? `<button class="add-word-toggle" onclick="openAddForm()">+ Add word</button>` : ""}
    ${form}
    <div class="word-list">${rows || '<div class="word-row-en" style="padding:10px 2px;">No matches.</div>'}</div>
  `;
}

function renderPhrasesView(){
  const q = state.phraseSearch.trim().toLowerCase();
  const results = q
    ? PHRASES.filter(p =>
        p.english.toLowerCase().includes(q) ||
        p.japanese.includes(q) ||
        p.hiragana.includes(q) ||
        (p.tags || []).join(" ").toLowerCase().includes(q)
      )
    : PHRASES;

  const rows = results.map(p => `
    <div class="word-row">
      <div style="cursor:pointer; flex:1;" onclick="openEditPhraseForm('${p.id}')">
        <div class="word-row-jp jp">${esc(p.japanese)}</div>
        <div class="word-row-hira jp" style="font-size:12px;">${esc(p.hiragana)}</div>
        <div class="word-row-en">${esc(p.english)}${p.wordIds && p.wordIds.length ? ` · ${p.wordIds.length} linked word${p.wordIds.length === 1 ? "" : "s"}` : ""}</div>
      </div>
      <div class="word-row-status">${statusFor(p.id, "phrase")}</div>
      <button class="word-row-delete" onclick="deletePhrase('${p.id}')" aria-label="Delete ${esc(p.english)}">×</button>
    </div>
  `).join("");

  const msg = state.phraseFormMessage
    ? `<div class="${state.phraseFormMessage.type === 'warning' ? 'form-warning' : 'form-success'}" style="margin-bottom:14px;">${esc(state.phraseFormMessage.text)}</div>`
    : "";

  let analysisHtml = "";
  if (state.phraseFormMode && state.phraseAnalysis){
    const { knownIds, unknownSpans } = state.phraseAnalysis;
    const knownChips = knownIds.map(id => {
      const w = ALL_WORDS.find(x => x.id === id);
      return w ? `<span class="chip chip-known jp">${esc(w.kanji)} <span style="font-weight:400;">(${esc(w.english)})</span></span>` : "";
    }).join("");

    const unknownCards = unknownSpans.map((span, idx) => `
      <div class="unknown-word-card">
        <div class="unknown-kanji jp">${esc(span)}</div>
        <input id="unk-hira-${idx}" class="form-input jp" placeholder="hiragana reading" />
        <input id="unk-en-${idx}" class="form-input" placeholder="English meaning" />
        <div style="display:flex; gap:6px;">
          <button type="button" class="form-submit" style="flex:1;" onclick="addUnknownWord(${idx})">Add this word</button>
          <button type="button" class="form-cancel" onclick="ignoreUnknownWord(${idx})">Ignore for now</button>
        </div>
      </div>
    `).join("");

    analysisHtml = `
      <div class="analysis-box">
        ${unknownSpans.length > 0
          ? `<div class="form-warning">This phrase contains ${unknownSpans.length} vocabulary word${unknownSpans.length === 1 ? "" : "s"} that ${unknownSpans.length === 1 ? "isn't" : "aren't"} in your library.</div>`
          : (knownIds.length > 0 ? `<div class="form-success">Every word in this phrase is already in your library.</div>` : "")
        }
        ${knownChips ? `<div class="chip-row">${knownChips}</div>` : ""}
        ${unknownCards}
      </div>
    `;
  }

  const d = state.phraseDraft || { japanese:"", hiragana:"", english:"", tags:"", source:"" };
  const form = state.phraseFormMode ? `
    <form class="add-form" id="phrase-form" onsubmit="submitPhraseForm(event)">
      <div class="form-row-title">${state.phraseFormMode === "edit" ? "Edit phrase" : "Add a phrase"}</div>
      <div>
        <label class="form-label">Japanese phrase *</label>
        <textarea class="form-input jp" name="japanese" required rows="2">${esc(d.japanese)}</textarea>
      </div>
      <button type="button" class="form-cancel" onclick="checkPhraseWords()">Check vocabulary</button>
      ${analysisHtml}
      <div>
        <label class="form-label">Hiragana reading *</label>
        <input class="form-input jp" name="hiragana" required value="${esc(d.hiragana)}" />
      </div>
      <div>
        <label class="form-label">English meaning *</label>
        <input class="form-input" name="english" required value="${esc(d.english)}" />
      </div>
      <div>
        <label class="form-label">Tags (comma-separated)</label>
        <input class="form-input" name="tags" placeholder="anime, JLPT N5…" value="${esc(d.tags)}" />
      </div>
      <div>
        <label class="form-label">Source</label>
        <input class="form-input" name="source" placeholder="textbook, app, personal list…" value="${esc(d.source)}" />
      </div>
      <div style="display:flex; gap:8px;">
        <button type="submit" class="form-submit" style="flex:1;">${state.phraseFormMode === "edit" ? "Save changes" : "Save phrase"}</button>
        <button type="button" class="form-cancel" onclick="closePhraseForm()">Cancel</button>
      </div>
    </form>
  ` : "";

  return `
    ${renderHeader()}
    <input class="search-input" placeholder="Search by english, kanji, or hiragana" value="${esc(state.phraseSearch)}" oninput="state.phraseSearch=this.value; render(); const el=document.querySelector('.search-input'); if(el){el.focus(); el.value=this.value; el.setSelectionRange(this.value.length,this.value.length);}" />
    <div class="word-count">${results.length} of ${PHRASES.length} phrases</div>
    ${msg}
    ${state.phraseFormMode !== "add" ? `<button class="add-word-toggle" onclick="openAddPhraseForm()">+ Add phrase</button>` : ""}
    ${form}
    <div class="word-list">${rows || '<div class="word-row-en" style="padding:10px 2px;">No matches.</div>'}</div>
  `;
}

function render(){
  const root = document.getElementById("root");
  if (state.view === "library") root.innerHTML = renderLibraryView();
  else if (state.view === "phrases") root.innerHTML = renderPhrasesView();
  else root.innerHTML = renderStudyView();
}

async function init(){
  customVocab = await loadCustomVocab();
  baseOverrides = await loadBaseOverrides();
  baseDeleted = await loadBaseDeleted();
  idCounter = await loadIdCounter();
  rebuildAllWords();

  const storedPhrases = await loadPhrases();
  PHRASES = storedPhrases !== null ? storedPhrases : BASE_PHRASES.slice();
  if (storedPhrases === null) await savePhrases(PHRASES);
  phraseIdCounter = await loadPhraseIdCounter();

  const storedProgress = await loadProgress();
  const schema = await loadProgressSchema();
  state.progress = ensureAllCards(migrateProgress(storedProgress));
  if (schema < PROGRESS_SCHEMA){
    await saveProgress(state.progress);
    await saveProgressSchema(PROGRESS_SCHEMA);
  }
  buildQueue(false);
  render();
}
init();
</script>
</body>
</html>
